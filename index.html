<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Export Fleet JSON</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    button {
      padding: 12px 18px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 12px;
    }
    #status {
      margin-top: 16px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h2>Export Fleet JSON</h2>
<p>Click the button below to export the last 7 days of cruise and coast input data for Power BI.</p>

<button id="exportAllBtn">Save Fleet JSON</button>

<div id="status"></div>

<script>
let apiRef = null;

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function downloadJson(filename, data) {
  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

async function getStatusData(diagnosticId, fromDate, toDate, resultsLimit = 5000) {
  return await apiRef.call("Get", {
    typeName: "StatusData",
    search: {
      diagnosticSearch: {
        id: diagnosticId
      },
      fromDate: fromDate.toISOString(),
      toDate: toDate.toISOString()
    },
    resultsLimit: resultsLimit
  });
}

async function exportAllJson() {
  try {
    setStatus("Requesting data from Geotab...");

    const fromDate = new Date();
    fromDate.setDate(fromDate.getDate() - 7);

    const toDate = new Date();

    const [
      cruiseControlActive,
      roadSpeed,
      instantaneousFuelRate,
      ignition
    ] = await Promise.all([
      getStatusData("DiagnosticCruiseControlActiveId", fromDate, toDate, 5000),
      getStatusData("DiagnosticEngineRoadSpeedId", fromDate, toDate, 5000),
      getStatusData("DiagnosticInstantaneousFuelRateId", fromDate, toDate, 5000),
      getStatusData("DiagnosticIgnitionId", fromDate, toDate, 5000)
    ]);

    const result = {
      exportedAt: new Date().toISOString(),
      fromDate: fromDate.toISOString(),
      toDate: toDate.toISOString(),
      diagnostics: {
        cruiseControlActive: cruiseControlActive,
        roadSpeed: roadSpeed,
        instantaneousFuelRate: instantaneousFuelRate,
        ignition: ignition
      }
    };

    downloadJson("fleet_inputs_7days.json", result);
    setStatus("Download started. Save the file, then refresh Power BI.");
  } catch (err) {
    console.error(err);
    setStatus("Error: " + err.message);
  }
}

window.geotab = window.geotab || {};
window.geotab.addin = window.geotab.addin || {};

window.geotab.addin.exportCruisePage = function () {
  return {
    initialize: function (api, state, callback) {
      apiRef = api;
      callback();

      setTimeout(() => {
        const btn = document.getElementById("exportAllBtn");
        if (btn) {
          btn.addEventListener("click", exportAllJson);
        }
      }, 0);
    },
    focus: function () {},
    blur: function () {}
  };
};
</script>

</body>
</html>
