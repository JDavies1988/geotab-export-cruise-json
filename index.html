<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Export Cruise JSON</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    button {
      padding: 12px 18px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 12px;
    }
    #status {
      margin-top: 16px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h2>Export Cruise JSON</h2>
<p>Click the button below to export the last 7 days of cruise control active data for Power BI.</p>

<button id="exportCruiseBtn">Save Cruise JSON</button>

<div id="status"></div>

<script>
let apiRef = null;

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function downloadJson(filename, data) {
  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

async function getStatusData(diagnosticId, fromDate, toDate, resultsLimit = 5000) {
  return await apiRef.call("Get", {
    typeName: "StatusData",
    search: {
      diagnosticSearch: {
        id: diagnosticId
      },
      fromDate: fromDate.toISOString(),
      toDate: toDate.toISOString()
    },
    resultsLimit: resultsLimit
  });
}

async function exportCruiseJson() {
  try {
    setStatus("Requesting cruise data from Geotab...");

    const now = new Date();

// Start of 7 days ago
const fromDate = new Date(now);
fromDate.setDate(fromDate.getDate() - 7);
fromDate.setHours(0, 0, 0, 0);

// End of today
const toDate = new Date(now);
toDate.setHours(23, 59, 59, 999);

    const cruiseControlActive = await getStatusData(
      "DiagnosticCruiseControlActiveId",
      fromDate,
      toDate,
      5000
    );

    downloadJson("cruise_status_7days.json", cruiseControlActive);
    setStatus("Download started. Save the file, then refresh Power BI.");
  } catch (err) {
    console.error(err);
    setStatus("Error: " + err.message);
  }
}

window.geotab = window.geotab || {};
window.geotab.addin = window.geotab.addin || {};

window.geotab.addin.exportCruisePage = function () {
  return {
    initialize: function (api, state, callback) {
      apiRef = api;
      callback();

      setTimeout(() => {
        const btn = document.getElementById("exportCruiseBtn");
        if (btn) {
          btn.addEventListener("click", exportCruiseJson);
        }
      }, 0);
    },
    focus: function () {},
    blur: function () {}
  };
};
</script>

</body>
</html>
